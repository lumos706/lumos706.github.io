name: Refresh travel data

on:
  schedule:
    # GitHub Actions uses UTC. 01:00 UTC = 09:00 Asia/Shanghai.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      only:
        description: 'Optional comma-separated query keys for a targeted refresh'
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: travel-data-refresh
  cancel-in-progress: false

defaults:
  run:
    shell: bash -el {0}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
      ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
      LAST30DAYS_XHS_COOKIES_B64: ${{ secrets.LAST30DAYS_XHS_COOKIES_B64 }}
      LAST30DAYS_DOUYIN_COOKIES_B64: ${{ secrets.LAST30DAYS_DOUYIN_COOKIES_B64 }}
      FLYAI_API_KEY: ${{ secrets.FLYAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: travel-data
          python-version: '3.11'
          channels: conda-forge
          auto-activate: false
          conda-remove-defaults: true

      - name: Install last30days-cn research skill
        run: |
          npx --yes skills add Jesseovo/last30days-skill-cn -g -y

      - name: Install FlyAI skill
        run: |
          npx --yes skills add alibaba-flyai/flyai-skill -g -y

      - name: Install optional tokenizer and Playwright
        run: |
          python -m pip install jieba playwright
          python -m playwright install --with-deps chromium

      - name: Restore optional browser login
        run: |
          if [[ -n "${LAST30DAYS_XHS_COOKIES_B64:-}" ]]; then
            mkdir -p "$HOME/.config/last30days-cn/browser_cookies"
            printf '%s' "$LAST30DAYS_XHS_COOKIES_B64" \
              | base64 --decode \
              > "$HOME/.config/last30days-cn/browser_cookies/xiaohongshu_cookies.json"
            chmod 600 "$HOME/.config/last30days-cn/browser_cookies/xiaohongshu_cookies.json"
          fi
          if [[ -n "${LAST30DAYS_DOUYIN_COOKIES_B64:-}" ]]; then
            mkdir -p "$HOME/.config/last30days-cn/browser_cookies"
            printf '%s' "$LAST30DAYS_DOUYIN_COOKIES_B64" \
              | base64 --decode \
              > "$HOME/.config/last30days-cn/browser_cookies/douyin_cookies.json"
            chmod 600 "$HOME/.config/last30days-cn/browser_cookies/douyin_cookies.json"
          fi

      - name: Check source login health
        id: auth_health
        run: |
          python scripts/travel/check_travel_auth.py \
            --attempts 2 \
            --pause 8 \
            --timeout 90 \
            --report "$RUNNER_TEMP/travel-auth-health.json" \
            --summary "$GITHUB_STEP_SUMMARY" \
            --issue-body "$RUNNER_TEMP/travel-auth-issue.md"

      - name: Notify when login health needs attention
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          AUTH_OVERALL: ${{ steps.auth_health.outputs.overall }}
        run: |
          title="旅游数据登录态需要更新"
          issue_number="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/issues?state=open&per_page=100" \
              --jq 'map(select(.title == "旅游数据登录态需要更新")) | .[0].number // empty' \
              || true
          )"

          if [[ "$AUTH_OVERALL" == "healthy" ]]; then
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" \
                --body "每日预检已重新确认小红书和知乎主采集路径可用，自动关闭提醒。"
              gh issue close "$issue_number" --reason completed
            fi
            exit 0
          fi

          echo "::warning title=旅游数据登录态需要更新::小红书或知乎主采集路径已降级；正式刷新会继续使用公开搜索兜底。"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" \
              --body-file "$RUNNER_TEMP/travel-auth-issue.md" \
              --add-assignee "$GITHUB_REPOSITORY_OWNER"
            if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
              gh issue comment "$issue_number" \
                --body "今日预检仍未恢复，详情已更新至 Issue 正文：$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
          else
            gh issue create \
              --title "$title" \
              --body-file "$RUNNER_TEMP/travel-auth-issue.md" \
              --assignee "$GITHUB_REPOSITORY_OWNER"
          fi

      - name: Refresh travel snapshot
        env:
          TRAVEL_ONLY: ${{ inputs.only }}
        run: |
          args=(--allow-credentials --pause 10 --timeout 120)
          if [[ -n "${TRAVEL_ONLY:-}" ]]; then
            args+=(--only "$TRAVEL_ONLY")
          fi
          python scripts/travel/update_travel_data.py "${args[@]}"

      - name: Refresh FlyAI flight and hotel prices
        run: node scripts/travel/update_flyai_prices.mjs

      - name: Refresh local transport evidence
        run: |
          python scripts/travel/update_transport_guides.py \
            --allow-credentials \
            --pause 8 \
            --timeout 120

      - name: Refresh departure preparation evidence
        run: |
          python scripts/travel/update_departure_preparations.py \
            --allow-credentials \
            --pause 8 \
            --timeout 120

      - name: Refresh attraction reservation rules
        run: |
          python scripts/travel/update_reservation_rules.py \
            --allow-credentials \
            --quick \
            --pause 8 \
            --timeout 120

      - name: Check generated Douyin evidence
        id: douyin_health
        run: |
          python scripts/travel/check_douyin_evidence.py \
            --summary "$GITHUB_STEP_SUMMARY" \
            --issue-body "$RUNNER_TEMP/douyin-health-issue.md"

      - name: Notify when Douyin verification is needed
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DOUYIN_OVERALL: ${{ steps.douyin_health.outputs.overall }}
        run: |
          title="抖音旅游数据需要验证"
          issue_number="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/issues?state=open&per_page=100" \
              --jq 'map(select(.title == "抖音旅游数据需要验证")) | .[0].number // empty' \
              || true
          )"

          if [[ "$DOUYIN_OVERALL" == "healthy" ]]; then
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" \
                --body "最新一次刷新已重新取得可追溯的抖音攻略链接，自动关闭提醒。"
              gh issue close "$issue_number" --reason completed
            fi
            exit 0
          fi

          echo "::warning title=抖音旅游数据需要验证::last30days-cn 本轮没有在至少两个数据栏目中取得抖音依据，请在本机完成验证并更新加密 Cookie Secret。"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" \
              --body-file "$RUNNER_TEMP/douyin-health-issue.md" \
              --add-assignee "$GITHUB_REPOSITORY_OWNER"
          else
            gh issue create \
              --title "$title" \
              --body-file "$RUNNER_TEMP/douyin-health-issue.md" \
              --assignee "$GITHUB_REPOSITORY_OWNER"
          fi

      - name: Validate site
        run: |
          npm ci
          npm run build

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/travel/snapshot.json src/data/travel/reservations.json src/data/travel/transport.json src/data/travel/preparations.json
          if git diff --cached --quiet; then
            echo "Travel data is unchanged."
            exit 0
          fi
          git commit -m "data: refresh travel snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
