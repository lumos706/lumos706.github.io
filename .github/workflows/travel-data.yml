name: Refresh travel data

on:
  schedule:
    # GitHub Actions uses UTC. 13:00 UTC = 21:00 Asia/Shanghai.
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      only:
        description: 'Optional comma-separated query keys for a targeted refresh'
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: travel-data-refresh
  cancel-in-progress: false

defaults:
  run:
    shell: bash -el {0}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
      ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
      LAST30DAYS_XHS_COOKIES_B64: ${{ secrets.LAST30DAYS_XHS_COOKIES_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: travel-data
          python-version: '3.11'
          channels: conda-forge
          auto-activate: false
          conda-remove-defaults: true

      - name: Install official research skill
        run: npx --yes skills add Jesseovo/last30days-skill-cn -g -y

      - name: Install optional tokenizer and Playwright
        run: |
          python -m pip install jieba playwright
          python -m playwright install --with-deps chromium

      - name: Restore optional browser login
        run: |
          if [[ -n "${LAST30DAYS_XHS_COOKIES_B64:-}" ]]; then
            mkdir -p "$HOME/.config/last30days-cn/browser_cookies"
            printf '%s' "$LAST30DAYS_XHS_COOKIES_B64" \
              | base64 --decode \
              > "$HOME/.config/last30days-cn/browser_cookies/xiaohongshu_cookies.json"
            chmod 600 "$HOME/.config/last30days-cn/browser_cookies/xiaohongshu_cookies.json"
          fi

      - name: Check source login health
        id: auth_health
        run: |
          python scripts/travel/check_travel_auth.py \
            --attempts 2 \
            --pause 8 \
            --timeout 90 \
            --report "$RUNNER_TEMP/travel-auth-health.json" \
            --summary "$GITHUB_STEP_SUMMARY" \
            --issue-body "$RUNNER_TEMP/travel-auth-issue.md"

      - name: Notify when login health needs attention
        env:
          GH_TOKEN: ${{ github.token }}
          AUTH_OVERALL: ${{ steps.auth_health.outputs.overall }}
        run: |
          title="旅游数据登录态需要更新"
          issue_number="$(
            gh issue list \
              --state open \
              --limit 100 \
              --json number,title \
              --jq '.[] | select(.title == "旅游数据登录态需要更新") | .number' \
              | head -n 1
          )"

          if [[ "$AUTH_OVERALL" == "healthy" ]]; then
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" \
                --body "每日预检已重新确认小红书和知乎主采集路径可用，自动关闭提醒。"
              gh issue close "$issue_number" --reason completed
            fi
            exit 0
          fi

          echo "::warning title=旅游数据登录态需要更新::小红书或知乎主采集路径已降级；正式刷新会继续使用公开搜索兜底。"
          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" \
              --body-file "$RUNNER_TEMP/travel-auth-issue.md" \
              --add-assignee "$GITHUB_REPOSITORY_OWNER"
            if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
              gh issue comment "$issue_number" \
                --body "今日预检仍未恢复，详情已更新至 Issue 正文：$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
          else
            gh issue create \
              --title "$title" \
              --body-file "$RUNNER_TEMP/travel-auth-issue.md" \
              --assignee "$GITHUB_REPOSITORY_OWNER"
          fi

      - name: Refresh travel snapshot
        env:
          TRAVEL_ONLY: ${{ inputs.only }}
        run: |
          args=(--allow-credentials --pause 10 --timeout 120)
          if [[ -n "${TRAVEL_ONLY:-}" ]]; then
            args+=(--only "$TRAVEL_ONLY")
          fi
          python scripts/travel/update_travel_data.py "${args[@]}"

      - name: Validate site
        run: |
          npm ci
          npm run build

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/travel/snapshot.json
          if git diff --cached --quiet; then
            echo "Travel snapshot is unchanged."
            exit 0
          fi
          git commit -m "data: refresh travel snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
